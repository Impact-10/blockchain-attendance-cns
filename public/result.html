<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Attendance Result</h1>

      <div id="resultIcon" class="result-icon">?</div>
      <p id="message">Processing...</p>
      <div class="result-meta">
        <div><span>Student ID:</span> <strong id="studentMeta">-</strong></div>
        <div><span>Time:</span> <strong id="timeMeta">-</strong></div>
      </div>

      <nav class="links">
        <a class="btn-link" href="/submit">Submit Again</a>
        <button id="logoutBtn" type="button" class="ghost">Logout</button>
      </nav>
    </main>

    <script src="/js/result.js"></script>
  </body>
</html>
